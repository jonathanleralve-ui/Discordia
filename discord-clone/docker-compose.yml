services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: chatter
      POSTGRES_PASSWORD: chatter
      POSTGRES_DB: chatter
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatter -d chatter"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3000
      JWT_SECRET: change-this-secret-in-production
      PGHOST: db
      PGPORT: 5432
      PGUSER: chatter
      PGPASSWORD: chatter
      PGDATABASE: chatter
    ports:
      - "3000:3000"

volumes:
  db_data:
